<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>廉洁签名大屏</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{
            width:100vw;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:linear-gradient(140deg,#f0f8f3,#e4f1eb);
            flex-direction:column;
            gap:40px;
        }
        .title{font-size:44px;color:#20603f;letter-spacing:6px}
        .name{font-size:120px;font-weight:bold;color:#16472e;transition:0.3s}
    </style>
</head>
<body>
    <div class="title">廉洁承诺签名公示</div>
    <div class="name" id="show">等待签名</div>

    <script>
        // 每秒自动获取手机提交的名字
        async function load() {
            try {
                let res = await fetch("https://api.xbxin.com/sync/get/lianjie123");
                let text = await res.text();
                if (text) {
                    document.getElementById("show").innerText = text;
                }
            } catch (e) {}
        }
        setInterval(load, 1000);
        load();
    </script>
</body>
</html>
